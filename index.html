    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;

            while (true) {
              const { done, value } = await reader.read();

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');

      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

rmal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"a36e5b33-2443-49d3-8aa7-b9045bb4fd07\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f19a401d-1982-4812-b89a-053d5b5d7b10\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"c59f29eb-9be0-41d8-9fbd-fa807f35ba3f\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"3dd96450-05f0-4423-9529-d17265477510\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"731e10c6-2d26-4cae-a3ea-eb5cb47be354\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"9a57a347-770a-4463-95a8-8fa2f72b6704\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"a36e5b33-2443-49d3-8aa7-b9045bb4fd07\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>\n  :root {\n    /* ASTER icon gold palette applied to existing color-composition */\n    --bg:        #040405;\n    --bg-2:      #0A0907;\n    --panel:     rgba(10,9,7,0.64);\n    --panel-2:   rgba(53,46,30,0.60);\n    --ivory:     #F1EBDD;\n    --bone:      #F1EBDD;\n    --silver:    #CCAE6C;\n    --ash:       #907B4E;\n    --ash-soft:  #6E5E3C;\n    --gold:      #CCAE6C;\n    --gold-soft: rgba(110,94,60,0.46);\n    --spectral:  #F1EBDD;\n    --line:      rgba(204,174,108,0.18);\n    --line-soft: rgba(204,174,108,0.09);\n    --accent-1:  #6E5E3C;\n    --accent-2:  #CCAE6C;\n    --accent-3:  #F1EBDD;\n    --deep-1:    #040405;\n    --deep-2:    #0A0907;\n    --deep-3:    #352E1E;\n    --sp-gradient: linear-gradient(96deg, #6E5E3C 0%, #CCAE6C 30%, #F1EBDD 52%, #CCAE6C 72%, #6E5E3C 100%);\n    --aster-gradient-soft: linear-gradient(96deg, rgba(110,94,60,0.26) 0%, rgba(204,174,108,0.44) 36%, rgba(241,235,221,0.22) 52%, rgba(204,174,108,0.28) 72%, rgba(53,46,30,0.14) 100%);\n    --aster-line-gradient: linear-gradient(90deg, transparent 0%, rgba(110,94,60,0.55) 18%, rgba(204,174,108,0.86) 45%, rgba(241,235,221,0.62) 52%, rgba(204,174,108,0.78) 62%, rgba(110,94,60,0.42) 82%, transparent 100%);\n    --aster-panel-gradient: linear-gradient(145deg, rgba(4,4,5,0.78) 0%, rgba(53,46,30,0.46) 47%, rgba(10,9,7,0.74) 100%);\n    --serif:     \"Cormorant Garamond\", \"Times New Roman\", serif;\n    --sans:      \"Inter\", \"Helvetica Neue\", system-ui, sans-serif;\n    --mono:      \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n    --ease:      cubic-bezier(.2,.6,.15,1);\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; background: var(--bg); }\n  html { scroll-behavior: smooth; }\n  body {\n    color: var(--ivory);\n    font-family: var(--sans);\n    font-size: 15px;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n    overflow-x: hidden;\n    letter-spacing: 0.005em;\n    min-height: 100vh;\n  }\n  ::selection { background: rgba(111,95,61,0.35); color: var(--ivory); }\n  a { color: inherit; text-decoration: none; }\n  button { font-family: inherit; cursor: pointer; }\n  img { display: block; max-width: 100%; }\n\n  /* ─────────── atmospherics — cinematic light, restrained dots ─────────── */\n  /* base ambient field — very sparse gold dots, mostly invisible */\n  .dotfield {\n    position: fixed; inset: 0; z-index: 0; pointer-events: none;\n    background:\n      radial-gradient(circle, rgba(111,95,61,0.06) 1px, transparent 1.4px) 0 0 / 44px 44px;\n    -webkit-mask: radial-gradient(ellipse 110% 90% at 50% 30%, #000 30%, rgba(0,0,0,0.35) 70%, transparent 100%);\n            mask: radial-gradient(ellipse 110% 90% at 50% 30%, #000 30%, rgba(0,0,0,0.35) 70%, transparent 100%);\n    opacity: .85;\n  }\n  /* warm anamorphic light wash — top-left */\n  .light-tl {\n    position: fixed; top: -15%; left: -10%;\n    width: 70vw; height: 70vh;\n    background: radial-gradient(closest-side at 50% 50%, rgba(111,95,61,0.10), rgba(111,95,61,0.04) 35%, transparent 65%);\n    z-index: 0; pointer-events: none;\n    filter: blur(20px);\n  }\n  /* cool spectral light wash — bottom-right */\n  .light-br {\n    position: fixed; bottom: -20%; right: -15%;\n    width: 60vw; height: 70vh;\n    background: radial-gradient(closest-side at 50% 50%, rgba(216,184,114,0.07), rgba(216,184,114,0.02) 40%, transparent 70%);\n    z-index: 0; pointer-events: none;\n    filter: blur(24px);\n  }\n  /* persistent thin letterbox lines — like a film cut frame, top + bottom */\n  .letterbox-top, .letterbox-bot {\n    position: fixed; left: 0; right: 0; height: 1px;\n    background: var(--line);\n    z-index: 50; pointer-events: none;\n  }\n  .letterbox-top { top: 0; }\n  .letterbox-bot { bottom: 0; }\n\n  /* canvas-based particle dotfield — 3D parallax, liquid wobble */\n  #particles {\n    position: fixed; inset: 0; z-index: 0;\n    pointer-events: none;\n    width: 100%; height: 100%;\n    -webkit-mask: radial-gradient(ellipse 120% 90% at 50% 50%, #000 25%, rgba(0,0,0,0.55) 70%, transparent 100%);\n            mask: radial-gradient(ellipse 120% 90% at 50% 50%, #000 25%, rgba(0,0,0,0.55) 70%, transparent 100%);\n  }\n  .grain {\n    position: fixed; inset: 0; z-index: 1; pointer-events: none;\n    opacity: .06; mix-blend-mode: overlay;\n    background-image: url(\"data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScyNjAnIGhlaWdodD0nMjYwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPScyJyBzdGl0Y2hUaWxlcz0nc3RpdGNoJy8+PGZlQ29sb3JNYXRyaXggdmFsdWVzPScwIDAgMCAwIDAuOTUgIDAgMCAwIDAgMC45MiAgMCAwIDAgMCAwLjg2ICAwIDAgMCAwLjU1IDAnLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0nMTAwJScgaGVpZ2h0PScxMDAlJyBmaWx0ZXI9J3VybCgjbiknLz48L3N2Zz4=\");\n    animation: gr 1.2s steps(2) infinite;\n  }\n  @keyframes gr { 0%{transform:translate(0,0);} 50%{transform:translate(-3px,2px);} 100%{transform:translate(2px,-1px);} }\n  .vignette {\n    position: fixed; inset: 0; z-index: 2; pointer-events: none;\n    background:\n      radial-gradient(140% 90% at 50% 50%, transparent 55%, rgba(0,0,0,.65) 100%),\n      linear-gradient(180deg, rgba(4,5,6,.6) 0%, transparent 14%, transparent 86%, rgba(4,5,6,.85) 100%);\n  }\n  main, footer { position: relative; z-index: 3; }\n\n  /* ─────────── NAV — fixed, always persistent ─────────── */\n  .nav-shell {\n    position: fixed; top: 0; left: 0; right: 0;\n    z-index: 100;\n    padding: 22px 40px;\n    display: grid; grid-template-columns: 1fr auto 1fr;\n    align-items: center; gap: 32px;\n    background: linear-gradient(180deg, rgba(4,5,6,0.55) 0%, rgba(4,5,6,0.25) 60%, transparent 100%);\n    backdrop-filter: blur(8px) saturate(110%);\n    -webkit-backdrop-filter: blur(8px) saturate(110%);\n    transition: padding .45s var(--ease), background .45s var(--ease), border-color .45s var(--ease), backdrop-filter .45s var(--ease);\n    border-bottom: 1px solid transparent;\n    will-change: padding, background;\n  }\n  .nav-shell.scrolled {\n    padding: 12px 40px;\n    background: rgba(4,5,6,0.82);\n    backdrop-filter: blur(22px) saturate(130%);\n    -webkit-backdrop-filter: blur(22px) saturate(130%);\n    border-bottom: 1px solid var(--line-soft);\n  }\n  /* gold progress bar at bottom of nav, fills as user scrolls */\n  .nav-shell::after {\n    content: \"\"; position: absolute; left: 0; bottom: 0;\n    width: var(--scroll-progress, 0%); height: 1px;\n    background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);\n    transition: width .15s linear;\n    pointer-events: none;\n  }\n  .brand {\n    display: inline-flex; align-items: center; gap: 14px;\n    font-family: var(--mono); font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;\n    color: var(--ivory);\n  }\n  .brand .glyph {\n    width: 16px; height: 16px; position: relative;\n    border: 1px solid var(--gold); transform: rotate(45deg);\n  }\n  .brand .glyph::after {\n    content: \"\"; position: absolute; inset: 3px; background: var(--gold); opacity: .55;\n  }\n  .nav-links {\n    justify-self: center;\n    display: flex; gap: 4px;\n    background: rgba(10,8,6,0.55);\n    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);\n    border: 1px solid var(--line);\n    padding: 6px;\n    border-radius: 999px;\n  }\n  .nav-links a {\n    font-family: var(--sans); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--silver);\n    padding: 9px 16px;\n    border-radius: 999px;\n    transition: color .3s, background .3s;\n    position: relative;\n  }\n  .nav-links a:hover { color: var(--ivory); background: rgba(241,235,221,0.05); }\n  .nav-links a.active { color: var(--ivory); background: rgba(111,95,61,0.12); }\n  .nav-cta {\n    justify-self: end;\n    display: inline-flex; align-items: center; gap: 12px;\n    font-family: var(--sans); font-size: 11px; letter-spacing: 0.26em; text-transform: uppercase;\n    color: var(--ivory);\n    padding: 12px 22px;\n    border: 1px solid var(--gold-soft);\n    background: rgba(111,95,61,0.06);\n    border-radius: 999px;\n    transition: background .35s, border-color .35s;\n  }\n  .nav-cta:hover { background: rgba(111,95,61,0.16); border-color: var(--gold); }\n  .nav-cta::after {\n    content: \"\"; width: 6px; height: 6px;\n    border-top: 1px solid currentColor; border-right: 1px solid currentColor;\n    transform: rotate(45deg);\n  }\n  .menu-btn {\n    display: none;\n    background: transparent;\n    border: 1px solid var(--line);\n    width: 40px; height: 40px;\n    color: var(--bone);\n    justify-content: center; align-items: center;\n  }\n  .menu-btn span {\n    display: block; width: 18px; height: 1px; background: currentColor;\n    position: relative;\n  }\n  .menu-btn span::before, .menu-btn span::after {\n    content: \"\"; position: absolute; left: 0; width: 100%; height: 1px; background: currentColor;\n  }\n  .menu-btn span::before { top: -5px; }\n  .menu-btn span::after { top: 5px; }\n\n  /* ─────────── shared chrome ─────────── */\n  .eyebrow {\n    font-family: var(--mono);\n    font-size: 10.5px; letter-spacing: 0.32em; text-transform: uppercase;\n    color: var(--gold);\n    display: inline-flex; align-items: center; gap: 14px;\n  }\n  .eyebrow::before {\n    content: \"\"; width: 28px; height: 1px; background: currentColor; opacity: .7;\n  }\n  .display {\n    font-family: var(--serif); font-weight: 400;\n    color: var(--ivory);\n    font-size: clamp(34px, 4.2vw, 62px);\n    line-height: 1.05; letter-spacing: -0.015em;\n    text-wrap: balance; margin: 0;\n  }\n  .display em { font-style: italic; color: var(--bone); }\n  .lede {\n    color: var(--silver); font-weight: 300;\n    font-size: 16px; line-height: 1.65;\n    max-width: 56ch; text-wrap: pretty;\n    margin: 0;\n  }\n  .meta {\n    font-family: var(--mono); font-size: 10.5px;\n    letter-spacing: 0.26em; text-transform: uppercase;\n    color: var(--ash);\n  }\n\n  .btn {\n    display: inline-flex; align-items: center; gap: 14px;\n    font-family: var(--sans); font-size: 11.5px; letter-spacing: 0.26em; text-transform: uppercase;\n    color: var(--ivory);\n    padding: 16px 26px;\n    background: rgba(34,30,21,0.65);\n    border: 1px solid var(--gold);\n    transition: background .45s var(--ease), box-shadow .6s, color .35s;\n    position: relative; overflow: hidden;\n  }\n  .btn::before {\n    content: \"\"; position: absolute; inset: 0;\n    background: linear-gradient(120deg, transparent 0%, rgba(111,95,61,0.22) 50%, transparent 100%);\n    transform: translateX(-110%); transition: transform .9s var(--ease);\n  }\n  .btn:hover::before { transform: translateX(110%); }\n  .btn:hover { box-shadow: 0 0 70px -12px rgba(111,95,61,0.45); }\n  .btn .arr { width: 22px; height: 1px; background: currentColor; position: relative; }\n  .btn .arr::after {\n    content: \"\"; position: absolute; right: -1px; top: -3px;\n    width: 7px; height: 7px;\n    border-top: 1px solid currentColor; border-right: 1px solid currentColor;\n    transform: rotate(45deg);\n  }\n  .btn-ghost {\n    display: inline-flex; align-items: center; gap: 14px;\n    font-family: var(--sans); font-size: 11.5px; letter-spacing: 0.26em; text-transform: uppercase;\n    color: var(--bone);\n    padding: 14px 0;\n    border-bottom: 1px solid var(--line);\n    transition: color .35s, border-color .45s, padding .45s;\n  }\n  .btn-ghost:hover { color: var(--ivory); border-color: var(--gold); padding-right: 10px; }\n\n  /* reveal */\n  .reve rm: translateY(-50%);\n    background: linear-gradient(90deg,\n      transparent 0%,\n      rgba(216,184,114,0.0) 25%,\n      rgba(111,95,61,0.55) 50%,\n      rgba(216,184,114,0.0) 75%,\n      transparent 100%);\n    filter: blur(2px);\n    pointer-events: none; z-index: 0;\n    opacity: .85;\n    animation: flareBreathe 9s ease-in-out infinite;\n  }\n  .hero__flare::before {\n    content: \"\"; position: absolute; inset: 0;\n    background: linear-gradient(90deg, transparent 35%, rgba(241,235,221,0.85) 50%, transparent 65%);\n    filter: blur(0.6px);\n    transform: scaleY(0.4);\n  }\n  @keyframes flareBreathe {\n    0%,100% { opacity: .75; transform: translateY(-50%) scaleX(1); }\n    50% { opacity: 1; transform: translateY(-50%) scaleX(1.05); }\n  }\n  @keyframes haloRotate {\n    from { transform: translateY(-50%) rotate(0deg); }\n    to   { transform: translateY(-50%) rotate(360deg); }\n  }\n  /* faint full-frame brackets in the hero */\n  .hero__brackets {\n    position: absolute; inset: 110px 36px 70px;\n    pointer-events: none; z-index: 0;\n  }\n  .hero__brackets > span {\n    position: absolute; width: 22px; height: 22px;\n    border-color: var(--gold); border-style: solid; border-width: 0; opacity: .4;\n  }\n  .hero__brackets > span:nth-child(1) { top: 0; left: 0; border-top-width: 1px; border-left-width: 1px; }\n  .hero__brackets > span:nth-child(2) { top: 0; right: 0; border-top-width: 1px; border-right-width: 1px; }\n  .hero__brackets > span:nth-child(3) { bottom: 0; left: 0; border-bottom-width: 1px; border-left-width: 1px; }\n  .hero__brackets > span:nth-child(4) { bottom: 0; right: 0; border-bottom-width: 1px; border-right-width: 1px; }\n  @media (max-width: 900px) {\n    .hero__halo {\n      width: min(280px, 44vw);\n      height: min(320px, 34vh);\n      right: 18px;\n      bottom: 78px;\n      opacity: .42;\n    }\n  }\n  .hero__grid {\n    position: relative; z-index: 1;\n    width: 100%; max-width: 1440px; margin: 0 auto;\n    padding-top: 120p :1;}\n    80%{transform:scaleY(1);transform-origin:bottom;opacity:1;}\n    100%{transform:scaleY(0);transform-origin:bottom;opacity:0;}\n  }\n\n  /* ─────────── EPIGRAPH — controlled doctrine interstitial ─────────── */\n  .epigraph {\n    position: relative;\n    max-width: 1440px;\n    margin: 0 auto;\n    padding: clamp(86px, 10vh, 122px) 40px clamp(94px, 11vh, 134px);\n    min-height: clamp(380px, 48vh, 500px);\n    display: grid;\n    grid-template-columns: repeat(12, minmax(0, 1fr));\n    column-gap: clamp(18px, 2.4vw, 34px);\n    align-items: center;\n    isolation: isolate;\n  }\n  .epigraph::before {\n    content: \"\";\n    position: absolute;\n    left: 40px; right: 40px;\n    top: 9%; bottom: 8%;\n    background:\n      linear-gradient(90deg, rgba(4,5,6,0.94) 0%, rgba(4,5,6,0.88) 38%, rgba(4,5,6,0.91) 100%),\n      radial-gradient(circle at 78% 64%, rgba(204,174,108,0.055), transparent 34%);\n    border-top: 1px solid rgba(241,235,221,0.045);\n    border-bottom: 1px solid rgba(241,235,221,0.05);\n    z-index: -2;\n  }\n  .epigraph::after {\n    content: \"\";\n    position: absolute;\n    left: 40px; right: 40px; bottom: 0;\n    height: 1px;\n    background: linear-gradient(90deg, transparent 0%, rgba(144,123,78,0.13) 18%, rgba(204,174,108,0.34) 50%, rgba(144,123,78,0.13) 82%, transparent 100%);\n    opacity: .72;\n    z-index: -1;\n  }\n  .epigraph__aside {\n    grid-column: 2 / span 3;\n    max-width: 280px;\n    align-self: center;\n  }\n  .epigraph__aside::before {\n    content: \"\";\n    display: block;\n    width: 56px;\n    height: 1px;\n    margin-bottom: 20px;\n    background: linear-gradient(90deg, rgba(204,174,108,0.72), rgba(241,235,221,0.12));\n  }\n  .epigraph__index {\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.34em;\n    text-transform: uppercase;\n    color: var(--gold);\n    opacity: .9;\n    margin-bottom: 16px;\n  }\n  .epigraph__label {\n    max-width: 22ch;\n    font-size: 14px;\n    line-height: 1.55;\n    color: rgba(241,235,221,0.66);\n  }\n  .epigraph__body {\n    grid-column: 6 / span 6;\n    justify-self: start;\n    width: min(100%, 680px);\n    padding: 0;\n  }\n  .epigraph__body::before {\n    content: \"\";\n    display: block;\n    width: 48px;\n    height: 1px;\n    margin-bottom: 26px;\n    background: linear-gradient(90deg, rgba(204,174,108,0.78), rgba(241,235,221,0.16), transparent);\n    opacity: .84;\n  }\n  .epigraph__quote {\n    font-family: var(--serif);\n    font-weight: 300;\n    font-style: italic;\n    color: var(--bone);\n    font-size: clamp(27px, 2.28vw, 37px);\n    line-height: 1.28;\n    max-width: 22ch;\n    margin: 0;\n    text-wrap: balance;\n    letter-spacing: -0.008em;\n  }\n  .epigraph__quote span {\n    display: block;\n  }\n  .epigraph__quote .line2 {\n    text-indent: clamp(10px, 1.4vw, 22px);\n  }\n  .epigraph__quote .line3 {\n    text-indent: clamp(22px, 3vw, 48px);\n  }\n  .epigraph__quote .hang {\n    display: inline;\n    color: var(--gold);\n    opacity: .72;\n    font-style: normal;\n    margin-left: .24em;\n  }\n  .epigraph__sig {\n    margin-top: 24px;\n    padding-left: clamp(22px, 3vw, 48px);\n    font-family: var(--mono);\n    font-size: 10px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    color: rgba(241,235,221,0.50);\n  }\n  .epigraph__sig::before {\n    content: \"\";\n    display: inline-block;\n    width: 20px;\n    height: 1px;\n    background: linear-gradient(90deg, rgba(204,174,108,0.70), rgba(241,235,221,0.12));\n    vertical-align: middle;\n    margin-right: 13px;\n    opacity: .78;\n  }\n\n  /* ─────────── shared section ─────────── */\n  .section {\n    position: relative;\n    padding: 130px 40px;\n    max-width: 1440px;\n    margin: 0 auto;\n  }\n  .section__chapter {\n    display: flex; justify-content: space-between;\n    align-items: baseline; gap: 24px;\n    padding-bottom: 22px;\n    border-bottom: 1px solid var(--line);\n    margin-bottom: 64px;\n    position: relative;\ ding-bottom: 76px !important;\n    }\n\n    .hero__flare {\n      display: none !important;\n    }\n  }\n<\u002Fstyle>\n\n\n<style id=\"aster-option-a-geometric-v4\">\n  /* OPTION A: editorial cinematic layout. One geometry: masthead, quiet handoff, hero row. */\n  :root {\n    --aster-frame-x: clamp(44px, 4.4vw, 76px);\n    --aster-grid-max: 1480px;\n    --aster-masthead-h: clamp(300px, 38svh, 364px);\n    --aster-quiet-band: clamp(72px, 9svh, 96px);\n    --aster-hero-row-y: calc(var(--aster-masthead-h) + var(--aster-quiet-band));\n  }\n\n  /* Masthead keeps the brand ceremony, but its bottom edge becomes a quiet frame boundary. */\n  .nav-shell.masthead-nav {\n    min-height: var(--aster-masthead-h) !important;\n    padding-top: clamp(30px, 3.7svh, 42px) !important;\n    padding-bottom: clamp(24px, 3.1svh, 34px) !important;\n  }\n\n  .masthead-mark {\n    width: clamp(108px, 10.2vw, 138px) !important;\n    height: clamp(108px, 10.2vw, 138px) !important;\n  }\n\n  .masthead-diamond {\n    width: clamp(54px, 5.2vw, 70px) !important;\n    height: clamp(54px, 5.2vw, 70px) !important;\n  }\n\n  .masthead-word {\n    font-size: clamp(62px, 6vw, 94px) !important;\n    gap: clamp(30px, 4vw, 66px) !important;\n  }\n\n  .nav-shell.masthead-nav .nav-links {\n    margin-top: clamp(22px, 3svh, 30px) !important;\n  }\n\n  .nav-shell.masthead-nav::before {\n    width: min(520px, 40vw) !important;\n    opacity: 0.08 !important;\n    background: linear-gradient(90deg,\n      transparent 0%,\n      rgba(200,170,106,0.10) 35%,\n      rgba(241,235,221,0.16) 50%,\n      rgba(200,170,106,0.10) 65%,\n      transparent 100%) !important;\n  }\n\n  /* The hero no longer floats. It begins on a deliberate row beneath the quiet band. */\n  #hero.hero,\n  #hero.hero.scrolled {\n    min-height: 106svh !important;\n    padding-left: 0 !important;\n    padding-right: 0 !important;\n    padding-top: var(--aster-hero-row-y) !important;\n    padding-bottom: clamp(76px, 9svh, 118px) !important;\n : 1.045 !important;\n    letter-spacing: -0.018em !important;\n    max-width: 760px !important;\n  }\n\n  .hero__meta-row {\n    margin-top: clamp(26px, 3svh, 34px) !important;\n    padding-top: 18px !important;\n    column-gap: clamp(20px, 2.2vw, 32px) !important;\n    max-width: 760px !important;\n    opacity: 0.58 !important;\n  }\n\n  .hero__meta-row .k { font-size: 8.8px !important; }\n  .hero__meta-row .v { font-size: 16px !important; }\n  .hero__meta-row .v.live { font-size: 11px !important; }\n\n  /* Panel is locked to the headline top axis, not randomly floated. */\n  .hero__panel {\n    width: 100% !important;\n    max-width: 560px !important;\n    justify-self: start !important;\n    margin-top: clamp(42px, 5.4svh, 56px) !important;\n    transform: none !important;\n    padding: 24px 26px 22px !important;\n    opacity: 0.82 !important;\n    background:\n      radial-gradient(circle, rgba(241,235,221,0.032) 1px, transparent 1.45px) 0 0 / 20px 20px,\n      linear-gradient(180deg, rgba(10,8,6,0.58) 0%, rgba(10,8,6,0.48) 100%) !important;\n    border-color: rgba(200,170,106,0.18) !important;\n  }\n\n  .hero__panel::before {\n    width: 42px !important;\n    opacity: 0.58 !important;\n  }\n\n  .hero__panel .kicker {\n    font-size: 9.2px !important;\n    margin-bottom: 14px !important;\n    opacity: 0.78 !important;\n  }\n\n  .hero__panel p {\n    font-size: clamp(13.8px, 0.96vw, 15.2px) !important;\n    line-height: 1.54 !important;\n    margin-bottom: 11px !important;\n  }\n\n  .hero__panel p.sub {\n    font-size: 12.4px !important;\n    margin-top: 12px !important;\n    margin-bottom: 18px !important;\n    opacity: 0.74 !important;\n  }\n\n  .hero__panel .ctas {\n    margin-top: 18px !important;\n    gap: 18px !important;\n  }\n\n  .hero__panel .btn {\n    padding: 14px 26px !important;\n  }\n\n  .hero__panel .btn-ghost {\n    font-size: 10.5px !important;\n  }\n\n  /* Remove the ghost layer that was breaking the geometry behind the panel. */\n  .hero__slate {\n    opacity: 0 !important;\n    visibility: hidden !important;\n  }\n\n  .hero__flare {\n    top: calc(var(--aster-hero-row-y) - clamp(24px, 2.6svh, 32px)) !important;\n    bottom: auto !important;\n    height: 1px !important;\n    opacity: 0.055 !important;\n    filter: blur(4px) !important;\n  }\n\n  .hero__flare::before { opacity: 0.26 !important; }\n\n  .hero__halo {\n    right: max(var(--aster-frame-x), calc((100vw - var(--aster-grid-max)) / 2)) !important;\n    bottom: clamp(86px, 10svh, 126px) !important;\n    opacity: 0.20 !important;\n  }\n\n  .hero__brackets { opacity: 0.38 !important; }\n  .dotfield, #particles { opacity: 0.50 !important; }\n  .scroll-cue { opacity: 0.28 !important; }\n\n  @media (max-height: 820px) and (min-width: 1041px) {\n    .scroll-cue { display: none !important; }\n  }\n\n  @media (max-width: 1180px) {\n    .hero__grid {\n      grid-template-columns: minmax(0, 1fr) minmax(360px, 0.78fr) !important;\n      column-gap: clamp(46px, 5vw, 70px) !important;\n    }\n\n    .hero__headline {\n      font-size: clamp(36px, 4.4vw, 52px) !important;\n    }\n\n    .hero__panel {\n      max-width: 520px !important;\n      margin-top: clamp(38px, 5svh, 52px) !important;\n    }\n  }\n\n  @media (max-width: 1040px) {\n    :root {\n      --aster-frame-x: clamp(28px, 5vw, 44px);\n      --aster-masthead-h: clamp(286px, 38svh, 334px);\n      --aster-quiet-band: clamp(64px, 8svh, 86px);\n    }\n\n    #hero.hero,\n    #hero.hero.scrolled {\n      min-height: auto !important;\n      padding-top: var(--aster-hero-row-y) !important;\n      padding-bottom: 104px !important;\n    }\n\n    .hero__grid {\n      width: min(760px, calc(100vw - (var(--aster-frame-x) * 2))) !important;\n      grid-template-columns: 1fr !important;\n      row-gap: 36px !important;\n    }\n\n    .hero__panel {\n      margin-top: 0 !important;\n      max-width: 680px !important;\n      opacity: 0.88 !important;\n    }\n\n    .hero__meta-row {\n      grid-template-columns: repeat(2, minmax(0, auto)) !important;\n    }\n  }\n\n  @media (max-width: 760px) {\n    :root {\n      --aster-frame-x: 24px;\n      --aster-masthead-h: 252px;\n      --aster-quiet-band: 54px;\n    }\n\n    .masthead-mark {\n      width: 74px !important;\n      height: 74px !important;\n    }\n\n    .masthead-diamond {\n      width: 38px !important;\n      height: 38px !important;\n    }\n\n    .masthead-word {\n      font-size: clamp(38px, 13vw, 58px) !important;\n      gap: clamp(14px, 4.2vw, 24px) !important;\n    }\n\n    #hero.hero,\n    #hero.hero.scrolled {\n      padding-top: var(--aster-hero-row-y) !important;\n      padding-bottom: 86px !important;\n    }\n\n    #hero.hero::after,\n    .hero__flare {\n      display: none !important;\n    }\n\n    .hero__headline {\n      font-size: clamp(37px, 10vw, 50px) !important;\n    }\n\n    .hero__meta-row {\n      display: none !important;\n    }\n  }\n\n  @media (max-width: 1040px) {\n    .epigraph {\n      grid-template-columns: repeat(8, minmax(0, 1fr));\n      min-height: auto;\n      padding-top: 86px;\n      padding-bottom: 104px;\n      row-gap: 34px;\n    }\n    .epigraph__aside {\n      grid-column: 1 / span 3;\n    }\n    .epigraph__body {\n      grid-column: 4 / span 5;\n      width: min(100%, 600px);\n    }\n    .epigraph__quote {\n      font-size: clamp(27px, 3.4vw, 34px);\n      max-width: 23ch;\n    }\n  }\n  @media (max-width: 760px) {\n    .epigraph {\n      grid-template-columns: 1fr;\n      padding-left: 24px;\n      padding-right: 24px;\n      padding-top: 76px;\n      padding-bottom: 88px;\n      gap: 34px;\n    }\n    .epigraph::before {\n      left: 24px; right: 24px;\n      top: 5%; bottom: 6%;\n    }\n    .epigraph::after {\n      left: 24px; right: 24px;\n    }\n    .epigraph__aside,\n    .epigraph__body {\n      grid-column: 1;\n      width: 100%;\n    }\n    .epigraph__aside {\n      max-width: none;\n    }\n    .epigraph__body::before {\n      margin-bottom: 22px;\n    }\n    .epigraph__quote {\n      font-size: clamp(27px, 7.3vw, 34px);\n      line-height: 1.24;\n      max-width: 15ch;\n    }\n    .epigraph__quote .line2,\n    .epigraph__quote .line3,\n    .epigraph__sig {\n      text-indent: 0;\n      padding-left: 0;\n    }\n    .epigraph__sig {\n      letter-spacing: 0.24em;\n      line-height: 1.75;\n    }\n  }\n\n<\u002Fstyle>\n\n<style id=\"aster-geometry-pass-v1\">\n  /* ───────────────────────────────────────────────────────────────\n     GEOMETRY PASS — content sections only.\n     Scope: everything below the hero (premise, method, engagements,\n     work, qc, faq, engage-final, marquee, footer).\n     Does NOT touch: masthead, nav, drawer, hero, atmospherics.\n     Job: organize spacing, grids, breakpoints, scroll anchoring,\n     and mobile navigation between sections.\n     ─────────────────────────────────────────────────────────────── */\n\n  /* ─── scroll-margin so nav links land under the compact masthead ─── */\n  #premise, #method, #engagements, #work, #qc, #faq, #engage {\n    scroll-margin-top: 110px !important;\n  }\n  @media (max-width: 760px) {\n    #premise, #method, #engagements, #work, #qc, #faq, #engage {\n      scroll-margin-top: 90px !important;\n    }\n  }\n\n  /* ─── unified section rhythm ─── */\n  .section {\n    padding-top: clamp(96px, 11vw, 140px) !important;\n    padding-bottom: clamp(96px, 11vw, 140px) !important;\n  }\n  @media (max-width: 760px) {\n    .section {\n      padding-top: 72px !important;\n      padding-bottom: 72px !important;\n      padding-left: 22px !important;\n      padding-right: 22px !important;\n    }\n  }\n\n  /* unified chapter header — index + label on one tidy row */\n  .section__chapter {\n    display: grid !important;\n    grid-template-columns: auto 1fr !important;\n    align-items: end !important;\n    column-gap: clamp(20px, 3vw, 36px) !important;\n    padding-bottom: 20px !important;\n    margin-bottom: clamp(40px, 5vw, 64px) !important;\n    border-bottom: 1px solid var(--line) !important;\n  }\n  .section__chapter::after {\n    /* kill the floating dotted constellation cluster — it was breaking alignment */\n    display: none !important;\n  }\n  .section__chapter .ix {\n    font-size: clamp(40px, 6vw, 84px) !important;\n    line-height: 0.9 !important;\n  }\n  .section__chapter .label {\n    justify-self: end !important;\n    text-align: right !important;\n    padding-bottom: 8px !important;\n  }\n  @media (max-width: 540px) {\n    .section__chapter .label {\n      justify-self: start !important;\n      text-align: left !important;\n      grid-column: 1 / -1 !important;\n      padding-bottom: 0 !important;\n      padding-top: 14px !important;\n      border-top: 1px solid var(--line-soft) !important;\n      margin-top: 10px !important;\n    }\n    .section__chapter {\n      grid-template-columns: 1fr !important;\n    }\n  }\n\n  .section__head {\n    grid-template-columns: minmax(0, 1.25fr) minmax(0, 1fr) !important;\n    gap: clamp(40px, 5vw, 72px) !important;\n    margin-bottom: clamp(48px, 6vw, 72px) !important;\n    align-items: end !important;\n  }\n  @media (max-width: 900px) {\n    .section__head {\n      grid-template-columns: 1fr !important;\n      gap: 24px !important;\n    }\n  }\n\n  /* ─── PREMISE ─── responsive engine grid + principle ladder ─── */\n  .premise__engine {\n    grid-template-columns: repeat(5, minmax(0, 1fr)) !important;\n    margin-bottom: clamp(40px, 5vw, 64px) !important;\n  }\n  @media (max-width: 1080px) {\n    .premise__engine { grid-template-columns: repeat(5, minmax(0, 1fr)) !important; }\n  }\n  @media (max-width: 880px) {\n    .premise__engine { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }\n    .premise__node { border-right: 1px solid var(--line-soft) !important; border-bottom: 1px solid var(--line-soft) !important; }\n    .premise__node:nth-child(2n) { border-right: none !important; }\n    .premise__node:nth-last-child(-n+1) { border-bottom: none !important; }\n    .premise__node:nth-child(5) {\n      grid-column: 1 / -1 !important;\n      border-bottom: none !important;\n    }\n  }\n  @media (max-width: 540px) {\n    .premise__engine { grid-template-columns: 1fr !important; }\n    .premise__node {\n      border-right: none !important;\n      border-bottom: 1px solid var(--line-soft) !important;\n      padding: 28px 22px !important;\n      display: grid !important;\n      grid-template-columns: 56px 1fr !important;\n      column-gap: 18px !important;\n      row-gap: 6px !important;\n      align-items: start !important;\n      text-align: left !important;\n    }\n    .premise__node:last-child { border-bottom: none !important; }\n    .premise__node .num {\n      grid-column: 1; grid-row: 1;\n      margin: 0 !important;\n      align-self: center;\n    }\n    .premise__node .dot {\n      grid-column: 1; grid-row: 2 / span 2;\n      margin: 4px 0 0 !important;\n      justify-self: start;\n    }\n    .premise__node h4 {\n      grid-column: 2; grid-row: 1 / span 2;\n      margin: 0 !important;\n      align-self: center;\n      font-size: 20px !important;\n    }\n    .premise__node p {\n      grid-column: 2; grid-row: 3;\n      margin: 2px 0 0 !important;\n      text-align: left !important;\n      max-width: none !important;\n    }\n  }\n\n  .premise__principles {\n    grid-template-columns: repeat(3, minmax(0, 1fr)) !important;\n  }\n  @media (max-width: 900px) {\n    .premise__principles { grid-template-columns: 1fr !important; }\n    .premise__p {\n      border-right: none !important;\n      border-bottom: 1px solid var(--line) !important;\n      padding: 28px 22px !important;\n    }\n    .premise__p:last-child { border-bottom: none !important; }\n    .premise__p h3 { font-size: 24px !important; }\n  }\n\n  /* ─── METHOD ─── filmstrip stays desktop, stacks cleanly on mobile ─── */\n  @media (max-width: 760px) {\n    .filmstrip-wrap {\n      margin-left: 0 !important;\n      margin-right: 0 !important;\n      padding: 0 !important;\n    }\n    .filmstrip- n  }\n  #hero.hero .hero__meta-row .v {\n    font-family: var(--sans) !important;\n    font-style: normal !important;\n    font-size: 12.5px !important;\n    color: var(--bone) !important;\n    letter-spacing: 0.02em !important;\n    line-height: 1.3;\n  }\n  #hero.hero .hero__meta-row .v.live {\n    font-size: 10.5px !important;\n    letter-spacing: 0.18em !important;\n    color: var(--gold) !important;\n  }\n\n  /* ── atmosphere: dim so the hero reads cleanly ── */\n  #hero.hero .hero__halo { opacity: 0.14 !important; }\n  #hero.hero .hero__flare { opacity: 0.04 !important; }\n  #hero.hero .hero__brackets { opacity: 0.24 !important; }\n  #hero.hero .hero__slate { display: none !important; }\n  #hero.hero::after {\n    display: none !important;\n  }\n\n  /* ── tablet ── */\n  @media (max-width: 1180px) {\n    #hero.hero .hero__grid {\n      padding-left: 24px !important;\n      padding-right: 24px !important;\n    }\n    #hero.hero .hero__headline {\n      font-size: clamp(15px, 2.2vw, 26px) !important;\n    }\n  }\n\n  /* ── below 720px: allow the headline to wrap to multiple lines ── */\n  @media (max-width: 720px) {\n    #hero.hero .hero__headline,\n    #hero.hero .hero__headline > span,\n    #hero.hero .hero__headline .l-em {\n      white-space: normal !important;\n      text-wrap: balance !important;\n    }\n    #hero.hero .hero__headline {\n      max-width: 30ch !important;\n      font-size: clamp(22px, 6.4vw, 30px) !important;\n      line-height: 1.25 !important;\n    }\n  }\n\n  /* ── mobile ── */\n  @media (max-width: 760px) {\n    #hero.hero .hero__grid {\n      width: calc(100vw - 36px) !important;\n      padding-top: clamp(20px, 3svh, 32px) !important;\n      padding-left: 0 !important;\n      padding-right: 0 !important;\n      row-gap: 0 !important;\n    }\n    #hero.hero .hero__lockup .eyebrow {\n      font-size: 9.5px !important;\n    }\n    #hero.hero .hero__lockup .eyebrow::before,\n    #hero.hero .hero__lockup .eyebrow::after {\n      width: 18px !important;\n    }\n    #hero.hero .hero__panel .ctas {\n      gap: 14px !important;\n      flex-direction: column !important;\n      align-items: center !important;\n      width: 100%;\n    }\n    #hero.hero .hero__panel .btn {\n      padding: 14px 22px !important;\n      width: min(280px, 100%);\n      justify-content: center;\n    }\n    #hero.hero .hero__meta-row {\n      grid-template-columns: repeat(2, minmax(0, auto)) !important;\n      row-gap: 18px !important;\n      column-gap: 32px !important;\n      margin-top: 40px !important;\n    }\n  }\n<\u002Fstyle>\n<style id=\"aster-doctrine-redesign-v1\">\n  /* ───────────────────────────────────────────────────────────────\n     DOCTRINE SECTION REDESIGN — centered editorial composition.\n     Original was a 12-col asymmetric split with text-indent staircase\n     in the quote. We restore axial symmetry to match the hero.\n     ─────────────────────────────────────────────────────────────── */\n\n  .epigraph {\n    display: flex !important;\n    flex-direction: column !important;\n    align-items: center !important;\n    justify-items: center !important;\n    text-align: center !important;\n    padding: clamp(96px, 12vw, 160px) clamp(24px, 4vw, 48px) !important;\n    grid-template-columns: none !important;\n    min-height: 0 !important;\n    max-width: 1200px !important;\n    margin: 0 auto !important;\n  }\n  .epigraph::before {\n    /* tone down the heavy two-tone panel background — just a quiet centered rule */\n    left: 50% !important;\n    right: auto !important;\n    transform: translateX(-50%) !important;\n    width: min(820px, calc(100% - 48px)) !important;\n    top: 8% !important;\n    bottom: 8% !important;\n    background:\n      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(204,174,108,0.06), transparent 70%),\n      rgba(4,5,6,0.55) !important;\n    border: 1px solid rgba(204,174,108,0.07) !important;\n  }\n  .epigraph::after { display: none !important; }\n\n  .epigraph__aside {\n    grid-column: auto !important;\n    max-width: none !important;\n    align-self: auto !important;\n    display: flex !important;\n    flex-direction: column;\n    align-items: center;\n    margin: 0 auto;\n  }\n  .epigraph__aside::before {\n    margin: 0 auto 20px !important;\n    width: 56px !important;\n    background: linear-gradient(90deg, transparent, rgba(204,174,108,0.72), transparent) !important;\n  }\n  .epigraph__index {\n    margin-bottom: 14px !important;\n    font-size: 10.5px !important;\n    letter-spacing: 0.32em !important;\n    color: var(--gold) !important;\n    opacity: 0.95 !important;\n  }\n  .epigraph__label {\n    max-width: 36ch !important;\n    margin: 0 auto clamp(40px, 6vh, 64px) !important;\n    text-align: center !important;\n    font-family: var(--serif) !important;\n    font-style: italic !important;\n    font-size: clamp(15px, 1.2vw, 18px) !important;\n    line-height: 1.5 !important;\n    color: var(--bone) !important;\n    opacity: 0.7;\n  }\n\n  .epigraph__body {\n    grid-column: auto !important;\n    justify-self: center !important;\n    width: 100% !important;\n    max-width: 760px !important;\n    padding: 0 !important;\n    text-align: center !important;\n    margin: 0 auto !important;\n  }\n  .epigraph__body::before { display: none !important; }\n\n  .epigraph__quote {\n    font-family: var(--serif) !important;\n    font-style: italic !important;\n    font-weight: 400 !important;\n    font-size: clamp(13px, 1.5vw, 22px) !important;\n    line-height: 1.35 !important;\n    letter-spacing: 0.025em !important;\n    color: var(--ivory) !important;\n    text-align: center !important;\n    max-width: none !important;\n    width: 100% !important;\n    margin: 0 auto !important;\n    white-space: nowrap !important;\n    text-wrap: nowrap !important;\n    word-spacing: 0.04em !important;\n  }\n  /* eliminate the staircase indents — let the quote flow as one balanced block */\n  .epigraph__quote span,\n  .epigraph__quote .line2,\n  .epigraph__quote .line3 {\n    display: inline !important;\n    text-indent: 0 !important;\n    white-space: nowrap !important;\n  }\n  .epigraph__quote .line2::before,\n  .epigraph__quote .line3::before {\n    content: \" \" !important;\n  }\n  /* remove the em-dash entirely */\n  .epigraph__quote .hang {\n    display: none !important;\n  }\n\n  .epigraph__sig {\n    margin-top: clamp(28px, 4vh, 40px) !important;\n    padding-left: 0 !important;\n    text-align: center !important;\n    font-family: var(--mono) !important;\n    font-size: 10px !important;\n    letter-spacing: 0.32em !important;\n    text-transform: uppercase;\n    color: rgba(241,235,221,0.5) !important;\n    display: inline-flex !important;\n    align-items: center;\n    justify-content: center;\n    gap: 12px;\n    width: 100%;\n  }\n  .epigraph__sig::before {\n    content: \"\" !important;\n    display: inline-block !important;\n    width: 24px !important;\n    height: 1px !important;\n    background: linear-gradient(90deg, transparent, rgba(204,174,108,0.7)) !important;\n    margin: 0 !important;\n    opacity: 1 !important;\n  }\n  .epigraph__sig::after {\n    content: \"\" !important;\n    display: inline-block !important;\n    width: 24px !important;\n    height: 1px !important;\n    background: linear-gradient(90deg, rgba(204,174,108,0.7), transparent) !important;\n  }\n\n  @media (max-width: 760px) {\n    .epigraph {\n      padding: 72px 22px !important;\n    }\n    .epigraph__quote,\n    .epigraph__quote span {\n      white-space: normal !important;\n      text-wrap: balance !important;\n      font-size: clamp(17px, 4.6vw, 22px) !important;\n      max-width: 24ch !important;\n      letter-spacing: 0.01em !important;\n      line-height: 1.4 !important;\n    }\n    .epigraph__quote {\n      width: auto !important;\n      margin: 0 auto !important;\n    }\n    .epigraph__label {\n      font-size: 14px !important;\n    }\n    .epigraph__sig {\n      font-size: 9px !important;\n      letter-spacing: 0.26em !important;\n    }\n    .epigraph__sig::before,\n    .epigraph__sig::after { width: 18px !important; }\n  }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n\n\n\n\n<!-- ambient atmospherics — sparse dotfield, twin light washes, letterbox frame, grain, vignette, canvas particles -->\n<div class=\"dotfield\" aria-hidden=\"true\"><\u002Fdiv>\n<div class=\"light-tl\" aria-hidden=\"true\"><\u002Fdiv>\n<div class=\"light-br\" aria-hidden=\"true\"><\u002Fdiv>\n<canvas id=\"particles\" aria-hidden=\"true\"><\u002Fcanvas>\n<div class=\"grain\" aria-hidden=\"true\"><\u002Fdiv>\n<div class=\"vignette\" aria-hidden=\"true\"><\u002Fdiv>\n<div class=\"letterbox-top\" aria-hidden=\"true\"><\u002Fdiv>\n<div class=\"letterbox-bot\" aria-hidden=\"true\"><\u002Fdiv>\n\n<header class=\"nav-shell masthead-nav\" id=\"nav\">\n  <a class=\"brand masthead-brand\" href=\"#hero\" aria-label=\"ASTER home\">\n    <span class=\"masthead-mark\" aria-hidden=\"true\">\n      <span class=\"masthead-axis masthead-axis--v\"><\u002Fspan>\n      <span class=\"masthead-axis masthead-axis--h\"><\u002Fspan>\n      <span class=\"masthead-diamond\"><span><\u002Fspan><\u002Fspan>\n    <\u002Fspan>\n    <span class=\"masthead-word\" aria-label=\"ASTER\">\n      <span>A<\u002Fspan><span>S<\u002Fspan><span>T<\u002Fspan><span>E<\u002Fspan><span>R<\u002Fspan>\n    <\u002Fspan>\n  <\u002Fa>\n  <nav class=\"nav-links\" id=\"navLinks\" aria-label=\"Primary\">\n    <a href=\"#premise\" data-target=\"premise\">Premise<\u002Fa>\n    <a href=\"#method\" data-target=\"method\">Method<\u002Fa>\n    <a href=\"#engagements\" data-target=\"engagements\">Engagements<\u002Fa>\n    <a href=\"#work\" data-target=\"work\">Work<\u002Fa>\n    <a href=\"#qc\" data-target=\"qc\">QC<\u002Fa>\n    <a href=\"#faq\" data-target=\"faq\">FAQ<\u002Fa>\n  <\u002Fnav>\n  <a class=\"nav-cta\" href=\"#engage\">Engage<\u002Fa>\n  <button class=\"menu-btn\" id=\"menuBtn\" aria-label=\"Open menu\">\n    <span><\u002Fspan>\n  <\u002Fbutton>\n<\u002Fheader>\n\n<div class=\"mobile-menu\" id=\"mobileMenu\" role=\"dialog\" aria-hidden=\"true\">\n  <button class=\"mobile-menu__close\" id=\"menuClose\" aria-label=\"Close menu\">×<\u002Fbutton>\n  <nav>\n    <a href=\"#premise\" data-mm=\"\"><span>Premise<\u002Fspan><span class=\"n\">02<\u002Fspan><\u002Fa>\n    <a href=\"#method\" data-mm=\"\"><span>Method<\u002Fspan><span class=\"n\">03<\u002Fspan><\u002Fa>\n    <a href=\"#engagements\" data-mm=\"\"><span>Engagements<\u002Fspan><span class=\"n\">04<\u002Fspan><\u002Fa>\n    <a href=\"#work\" data-mm=\"\"><span>Work<\u002Fspan><span class=\"n\">05<\u002Fspan><\u002Fa>\n    <a href=\"#qc\" data-mm=\"\"><span>Quality Control<\u002Fspan><span class=\"n\">06<\u002Fspan><\u002Fa>\n    <a href=\"#faq\" data-mm=\"\"><span>FAQ<\u002Fspan><span class=\"n\">07<\u002Fspan><\u002Fa>\n  <\u002Fnav>\n  <a class=\"cta\" href=\"#engage\" data-mm=\"\">Start a project<\u002Fa>\n<\u002Fdiv>\n\n<main>\n\n  <!-- ═══ 01 HERO ═══ -->\n  <section id=\"hero\" class=\"hero\" data-screen-label=\"01 Hero\">\n    <div class=\"hero__halo\" aria-hidden=\"true\"><\u002Fdiv>\n    <div class=\"hero__flare\" aria-hidden=\"true\"><\u002Fdiv>\n    <div class=\"hero__brackets\" aria-hidden=\"true\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n    <div class=\"hero__slate\" aria-hidden=\"true\">\n      <div><b>SC<\u002Fb>&nbsp;&nbsp;01 / HERO<\u002Fdiv>\n      <div>LENS&nbsp;&nbsp;ASTER OPTICAL 35MM<\u002Fdiv>\n      <div>ASA&nbsp;&nbsp;800 · 24 FPS<\u002Fdiv>\n      <div><b>ASTER<\u002Fb>&nbsp;&nbsp;GR. · STAR · VISION<\u002Fdiv>\n      <div>EST&nbsp;&nbsp;2026 · ROLL 01<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero__grid\">\n      <div class=\"hero__lockup\">\n        <div class=\"eyebrow reveal in\">AI-Native Commercial Film Studio<\u002Fdiv>\n        <h1 class=\"hero__headline reveal d1 in\">\n          <span>Premium<\u002Fspan>\n          <span class=\"l-em\">AI-native<\u002Fspan>\n          <span>commercial film,<\u002Fspan>\n          <span class=\"l-thin\">directed frame by frame.<\u002Fspan>\n        <\u002Fh1>\n      <\u002Fdiv>\n\n      <aside class=\"hero__panel reveal d3 in\">\n        <div class=\"kicker\">From the studio · TRANSMISSION.01<\u002Fdiv>\n        <p>\n          We don't produce AI video. We <em style=\"font-style:italic;color:var(--ivory)\">direct<\u002Fem> image, motion, desire, and brand meaning — from human truth to platform delivery, supervised in one controlled cinematic system.\n        <\u002Fp>\n        <p class=\"sub\">\n          Not output. Not volume. Not synthesis. Premium commercial film, built like films.\n        <\u002Fp>\n        <div class=\"ctas\">\n          <a class=\"btn\" href=\"#engage\">Start a project <span class=\"arr\" aria-hidden=\"true\"><\u002Fspan><\u002Fa>\n          <a class=\"btn-ghost\" href=\"#method\">View the method<\u002Fa>\n        <\u002Fdiv>\n      <\u002Faside>\n\n      <div class=\"hero__meta-row reveal d2 in\" aria-hidden=\"true\">\n        <div><span class=\"k\">Frame<\u002Fspan><span class=\"v\">01 / 08<\u002Fspan><\u002Fdiv>\n        <div><span class=\"k\">Format<\u002Fspan><span class=\"v\">Cinema · Vertical · Square<\u002Fspan><\u002Fdiv>\n        <div><span class=\"k\">Roster<\u002Fspan><span class=\"v\">Selective<\u002Fspan><\u002Fdiv>\n        <div><span class=\"k\">Status<\u002Fspan><span class=\"v live\">Open · Q3<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"scroll-cue\" aria-hidden=\"true\">\n      <span>Scroll<\u002Fspan>\n      <span class=\"stem\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ EPIGRAPH — controlled doctrine interstitial ═══ -->\n  <section class=\"epigraph\" aria-label=\"Studio doctrine\">\n    <div class=\"epigraph__aside reveal\">\n      <div class=\"epigraph__index\">02 / Doctrine<\u002Fdiv>\n      <div class=\"epigraph__label\">Commercial film as memory architecture.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"epigraph__body reveal d1\">\n      <p class=\"epigraph__quote\">\n        <span>A commercial is not a clip.<\u002Fspan>\n        <span class=\"line2\">It is a frame the viewer enters <span class=\"hang\">—<\u002Fspan><\u002Fspan>\n        <span class=\"line3\">and a feeling they leave with.<\u002Fspan>\n      <\u002Fp>\n      <div class=\"epigraph__sig reveal d2\">ASTER · Studio doctrine · 01<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ 02 PREMISE ═══ -->\n  <section id=\"premise\" class=\"section\" data-screen-label=\"02 Premise\">\n    <div class=\"section__chapter\">\n      <div class=\"ix\">02<\u002Fdiv>\n      <div class=\"label\">Premise · The Story Engine<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section__head\">\n      <h2 class=\"display reveal\">\n        AI can generate motion. It cannot generate <em>meaning.<\u002Fem>\n      <\u002Fh2>\n      <p class=\"lede reveal d1\">\n        Every ASTER film is built around a five-beat story engine — a deliberate sequence of human tension, pressure, product relevance, proof, and desire. The image is directed, not generated.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"premise__engine reveal\">\n      <div class=\"premise__node\">\n        <div class=\"num\">B.01<\u002Fdiv><div class=\"dot\" aria-hidden=\"true\"><\u002Fdiv>\n        <h4>Human truth<\u002Fh4>\n        <p>An honest emotion the viewer recognises before any brand appears.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"premise__node\">\n        <div class=\"num\">B.02<\u002Fdiv><div class=\"dot\" aria-hidden=\"true\"><\u002Fdiv>\n        <h4>Pressure<\u002Fh4>\n        <p>A tension that demands resolution, not decoration.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"premise__node\">\n        <div class=\"num\">B.03<\u002Fdiv><div class=\"dot\" aria-hidden=\"true\"><\u002Fdiv>\n        <h4>Product relevance<\u002Fh4>\n        <p>The product earns its place by answering the pressure.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"premise__node\">\n        <div class=\"num\">B.04<\u002Fdiv><div class=\"dot\" aria-hidden=\"true\"><\u002Fdiv>\n        <h4>Proof<\u002Fh4>\n        <p>A moment of visible, sensory evidence — not a claim.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"premise__node\">\n        <div class=\"num\">B.05<\u002Fdiv><div class=\"dot\" aria-hidden=\"true\"><\u002Fdiv>\n        <h4>Desire<\u002Fh4>\n        <p>The viewer leaves wanting the transformation, not the object.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"premise__principles\">\n      <div class=\"premise__p reveal\">\n        <div class=\"pn\">P.01 · Tension<\u002Fdiv>\n        <h3>Begin with what the viewer feels.<\u002Fh3>\n        <p>The frame opens on a human moment before the brand has earned the right to speak.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"premise__p reveal d1\">\n        <div class=\"pn\">P.02 · Relevance<\u002Fdiv>\n        <h3>The product enters only when needed.<\u002Fh3>\n        <p>No staged glamour. The product arrives as the answer the story has been asking for.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"premise__p reveal d2\">\n        <div class=\"pn\">P.03 · Desire<\u002Fdiv>\n        <h3>Close on transformation, not transaction.<\u002Fh3>\n        <p>The last image is the one the viewer carries. We engineer it on purpose.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ 03 METHOD — filmstrip ═══ -->\n  <section id=\"method\" class=\"section\" data-screen-label=\"03 Method\">\n    <div class=\"section__chapter\">\n      <div class=\"ix\">03<\u002Fdiv>\n      <div class=\"label\">Method · Six Supervised Phases<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section__head\">\n      <h2 class=\"display reveal\">\n        A controlled system for <em>cinematic<\u002Fem> AI-native production.\n      <\u002Fh2>\n      <p class=\"lede reveal d1\">\n        Six supervised phases under a single director — each carrying its own slate, frame reference, and finishing metadata. The film moves from diagnosis to delivery.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"filmstrip-wrap reveal\">\n      <div class=\"filmstrip\" id=\"filmstrip\">\n\n        <article class=\"phase\">\n          <div class=\"phase__bar\"><span class=\"id\">M.01<\u002Fspan><span>Phase 01 / Pre<\u002Fspan><\u002Fdiv>\n          <div class=\"phase__num\">01<\u002Fdiv>\n          <h3>Diagnosis<\u002Fh3>\n          <p>What is truly being sold beyond surface function? The brief is interrogated before the camera is opened.<\u002Fp>\n          <div class=\"phase__specs\">\n            <span class=\"k\">Shot<\u002Fspan><span class=\"v\">A — Brief<\u002Fspan>\n            <span class=\"k\">Frame<\u002Fspan><span class=\"v\">REF.001<\u002Fspan>\n            <span class=\"k\">Lens<\u002Fspan><span class=\"v\">35mm Anamorphic<\u002Fspan>\n            <span class=\"k\">TC<\u002Fspan><span class=\"v\">00:00:00<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <article class=\"phase\">\n          <div class=\"phase__bar\"><span class=\"id\">M.02<\u002Fspan><span>Phase 02 / Story<\u002Fspan><\u002Fdiv>\n          <div class=\"phase__num\">02<\u002Fdiv>\n          <h3>Story Engine<\u002Fh3>\n          <p>Human tension creates the need before the product appears. Tension, pressure, relevance, proof, desire.<\u002Fp>\n          <div class=\"phase__specs\">\n            <span class=\"k\">Shot<\u002Fspan><span class=\"v\">B — Beat sheet<\u002Fspan>\n            <span class=\"k\">Frame<\u002Fspan><span class=\"v\">REF.014<\u002Fspan>\n            <span class=\"k\">Lens<\u002Fspan><span class=\"v\">50mm Cooke<\u002Fspan>\n            <span class=\"k\">TC<\u002Fspan><span class=\"v\">00:00:08<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <article class=\"phase\">\n          <div class=\"phase__bar\"><span class=\"id\">M.03<\u002Fspan><span>Phase 03 / Visual<\u002Fspan><\u002Fdiv>\n          <div class=\"phase__num\">03<\u002Fdiv>\n          <h3>Visual DNA<\u002Fh3>\n          <p>Key frames, product presence, lighting, palette, and motion language are locked before any motion render is triggered.<\u002Fp>\n          <div class=\"phase__specs\">\n            <span class=\"k\">Shot<\u002Fspan><span class=\"v\">C — Key frames<\u002Fspan>\n            <span class=\"k\">Frame<\u002Fspan><span class=\"v\">REF.027<\u002Fspan>\n            <span class=\"k\">Lens<\u002Fspan><span class=\"v\">75mm Master<\u002Fspan>\n            <span class=\"k\">TC<\u002Fspan><span class=\"v\">00:00:14<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <article class=\"phase\">\n          <div class=\"phase__bar\"><span class=\"id\">M.04<\u002Fspan><span>Phase 04 / Motion<\u002Fspan><\u002Fdiv>\n          <div class=\"phase__num\">04<\u002Fdiv>\n          <h3>Motion Production<\u002Fh3>\n          <p>Approved frames become controlled image-to-video shots. Camera language, blocking, and product fidelity are protected.<\u002Fp>\n          <div class=\"phase__specs\">\n            <span class=\"k\">Shot<\u002Fspan><span class=\"v\">D — Plates<\u002Fspan>\n            <span class=\"k\">Frame<\u002Fspan><span class=\"v\">REF.041<\u002Fspan>\n            <span class=\"k\">Lens<\u002Fspan><span class=\"v\">100mm Macro<\u002Fspan>\n            <span class=\"k\">TC<\u002Fspan><span class=\"v\">00:00:21<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <article class=\"phase\">\n          <div class=\"phase__bar\"><span class=\"id\">M.05<\u002Fspan><span>Phase 05 / Post<\u002Fspan><\u002Fdiv>\n          <div class=\"phase__num\">05<\u002Fdiv>\n          <h3>Finish<\u002Fh3>\n          <p>Edit, grade, sound design, language, legal, and platform QC are supervised under one finishing line.<\u002Fp>\n          <div class=\"phase__specs\">\n            <span class=\"k\">Shot<\u002Fspan><span class=\"v\">E — Master<\u002Fspan>\n            <span class=\"k\">Frame<\u002Fspan><span class=\"v\">REF.058<\u002Fspan>\n            <span class=\"k\">Grade<\u002Fspan><span class=\"v\">Cinematic Low-Key<\u002Fspan>\n            <span class=\"k\">TC<\u002Fspan><span class=\"v\">00:00:27<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <article class=\"phase\">\n          <div class=\"phase__bar\"><span class=\"id\">M.06<\u002Fspan><span>Phase 06 / Out<\u002Fspan><\u002Fdiv>\n          <div class=\"phase__num\">06<\u002Fdiv>\n          <h3>Delivery<\u002Fh3>\n          <p>Master film plus platform-ready cutdowns: 16:9, 9:16, 1:1, 4:5; 30s, 15s, 9s, 6s — built for the channel.<\u002Fp>\n          <div class=\"phase__specs\">\n            <span class=\"k\">Shot<\u002Fspan><span class=\"v\">F — Cutdowns<\u002Fspan>\n            <span class=\"k\">Frame<\u002Fspan><span class=\"v\">REF.072<\u002Fspan>\n            <span class=\"k\">Codec<\u002Fspan><span class=\"v\">ProRes / H.265<\u002Fspan>\n            <span class=\"k\">TC<\u002Fspan><span class=\"v\">00:00:30<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n      <\u002Fdiv>\n      <button class=\"filmstrip__nav filmstrip__nav--prev\" type=\"button\" aria-label=\"Previous phase\" data-fs-nav=\"prev\">\n        <span class=\"filmstrip__nav-arrow\" aria-hidden=\"true\"><\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"filmstrip__nav filmstrip__nav--next\" type=\"button\" aria-label=\"Next phase\" data-fs-nav=\"next\">\n        <span class=\"filmstrip__nav-arrow\" aria-hidden=\"true\"><\u002Fspan>\n      <\u002Fbutton>\n      <div class=\"filmstrip__cue\">\n        <span data-fs-counter=\"\">01 / 06<\u002Fspan>\n        <span>06 phases · scroll or drag<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ 04 ENGAGEMENTS — table ═══ -->\n  <section id=\"engagements\" class=\"section\" data-screen-label=\"04 Engagements\">\n    <div class=\"section__chapter\">\n      <div class=\"ix\">04<\u002Fdiv>\n      <div class=\"label\">Engagements · Apertures into the System<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section__head\">\n      <h2 class=\"display reveal\">\n        Four ways to <em>build the frame.<\u002Fem>\n      <\u002Fh2>\n      <p class=\"lede reveal d1\">\n        Each engagement is a different aperture into the same controlled production system. Choose the depth of authorship the brand requires.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"engage-list reveal\">\n      <a class=\"engage-row\" href=\"#engage\">\n        <div class=\"engage-row__id\">E.01<\u002Fdiv>\n        <div>\n          <h3 class=\"engage-row__title\">Single Film<\u002Fh3>\n          <div class=\"engage-row__sub\">2 – 3 weeks<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"engage-row__desc\">A single cinematic commercial — one product, service, launch, or narrative moment, supervised end to end.<\u002Fdiv>\n        <div class=\"engage-row__price\">From <b>$3.5k<\u002Fb><\u002Fdiv>\n        <div class=\"engage-row__cta\">Discuss <span class=\"arr\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n      <\u002Fa>\n\n      <a class=\"engage-row\" href=\"#engage\">\n        <div class=\"engage-row__id\">E.02<\u002Fdiv>\n        <div>\n          <h3 class=\"engage-row__title\">Campaign Suite<\u002Fh3>\n          <div class=\"engage-row__sub\">4 – 6 weeks<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"engage-row__desc\">A coordinated suite of films and platform cutdowns built around one brand moment.<\u002Fdiv>\n        <div class=\"engage-row__price\">From <b>$12k<\u002Fb><\u002Fdiv>\n        <div class=\"engage-row__cta\">Discuss <span class=\"arr\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n      <\u002Fa>\n\n      <a class=\"engage-row\" href=\"#engage\">\n        <div class=\"engage-row__id\">E.03<\u002Fdiv>\n        <div>\n          <h3 class=\"engage-row__title\">Cinematic Brand System<\u002Fh3>\n          <div class=\"engage-row__sub\">6 – 8 weeks<\u002Fdiv>\n        <\u002Fdiv>
