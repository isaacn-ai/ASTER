QC ═══ -->\n  <section id=\"qc\" class=\"section\" data-screen-label=\"06 QC\">\n    <div class=\"section__chapter\">\n      <div class=\"ix\">06<\u002Fdiv>\n      <div class=\"label\">Quality Control · Built for Cinema<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section__head\">\n      <h2 class=\"display reveal\">\n        Built to avoid the failures of <em>generic AI video.<\u002Fem>\n      <\u002Fh2>\n      <p class=\"lede reveal d1\">\n        ASTER is structured to deliver commercial-grade work that reads as cinema, not synthesis. The difference is supervision at every stage.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"qc-cols reveal\">\n      <div class=\"qc-col left\">\n        <h4>Generic AI Video — Common Failures<\u002Fh4>\n        <p class=\"lead\">Output without authorship. Volume without taste. Motion without meaning.<\u002Fp>\n        <ul>\n          <li><span class=\"ic\"><\u002Fspan><span>Synthetic faces, warped hands<\u002Fspan><span class=\"k\">Identity<\u002Fspan><\u002Fli>\n          <li><span class=\"ic\"><\u002Fspan><span>Unstable products, broken text<\u002Fspan><span class=\"k\">Fidelity<\u002Fspan><\u002Fli>\n          <li><span class=\"ic\"><\u002Fspan><span>Weak story, random motion<\u002Fspan><span class=\"k\">Story<\u002Fspan><\u002Fli>\n          <li><span class=\"ic\"><\u002Fspan><span>Unclear ownership, fake glamour<\u002Fspan><span class=\"k\">Trust<\u002Fspan><\u002Fli>\n          <li><span class=\"ic\"><\u002Fspan><span>Generic stock-footage staging<\u002Fspan><span class=\"k\">Frame<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"qc-col right\">\n        <h4>ASTER — Controlled System<\u002Fh4>\n        <p class=\"lead\">A supervised production line for AI-native commercial film.<\u002Fp>\n        <ul>\n          <li><span class=\"ic\"><\u002Fspan><span>Visual DNA locked before motion<\u002Fspan><span class=\"k\">Visual<\u002Fspan><\u002Fli>\n          <li><span class=\"ic\"><\u002Fspan><span>Product fidelity protected<\u002Fspan><span class=\"k\">Product<\u002Fspan><\u002Fli>\n          <li><span class=\"ic\"><\u002Fspan><span>Language and claims review<\u002Fspan><span class=\"k\">Language<\u002Fspan><\u002Fli>\n          <li><span class=\"ic\"><\u002Fspan><span>Motion continuity supervised<\u002Fspan><span class=\"k\">Motion<\u002Fspan><\u002Fli>\n          <li><span class=\"ic\"><\u002Fspan><span>Post-production finishing<\u002Fspan><span class=\"k\">Post<\u002Fspan><\u002Fli>\n          <li><span class=\"ic\"><\u002Fspan><span>Legal and platform QC<\u002Fspan><span class=\"k\">Compliance<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ 07 FAQ ═══ -->\n  <section id=\"faq\" class=\"section\" data-screen-label=\"07 FAQ\">\n    <div class=\"section__chapter\">\n      <div class=\"ix\">07<\u002Fdiv>\n      <div class=\"label\">FAQ · Before the First Call<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section__head\">\n      <h2 class=\"display reveal\">\n        Before <em>the first call.<\u002Fem>\n      <\u002Fh2>\n      <p class=\"lede reveal d1\">\n        Practical answers to the questions most often raised before an engagement begins.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"faq__list reveal\">\n      <details class=\"faq-item\" open=\"\">\n        <summary><span class=\"idx\">Q.01<\u002Fspan><span>How do the rates compare to studios and freelancers?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-item__body\">ASTER is structured between traditional studio production and freelance execution. The value is not only asset generation; it is strategy, story, visual DNA, motion control, finishing direction, and platform-ready delivery under one system.<\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq-item\">\n        <summary><span class=\"idx\">Q.02<\u002Fspan><span>Why quote regulated industries separately?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-item__body\">Legal, medical, financial, beauty-claim, alcohol, automotive, and other regulated categories may require additional claim review, disclaimers, compliance checks, and approval cycles.<\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq-item\">\n        <summary><span class=\"idx\">Q.03<\u002Fspan><span>What does the first conversation look like?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-item__body\">The first conversation identifies the product, category, viewer tension, commercial objective, desired emotional outcome, usage platforms, and production constraints.<\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq-item\">\n        <summary><span class=\"idx\">Q.04<\u002Fspan><span>Who owns the final files?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-item__body\">Final ownership and usage rights are defined per engagement. Licensed music, voice, likenesses, AI-generated assets, stock elements, and third-party materials are reviewed before delivery.<\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq-item\">\n        <summary><span class=\"idx\">Q.05<\u002Fspan><span>How many engagements per quarter?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-item__body\">ASTER is intentionally selective. Capacity is limited to preserve control, quality, and direct authorship.<\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq-item\">\n        <summary><span class=\"idx\">Q.06<\u002Fspan><span>Do you use AI-generated assets in final delivery?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-item__body\">Yes, when commercially usable and properly reviewed. AI may generate assets, but the final master is supervised through edit, grade, sound, language, legal, and platform QC.<\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq-item\">\n        <summary><span class=\"idx\">Q.07<\u002Fspan><span>How is product accuracy protected?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-item__body\">Product references, hero plates, labels, geometry, color, and approved key frames are locked before motion production. Product deformation is corrected or composited when needed.<\u002Fdiv>\n      <\u002Fdetails>\n      <details class=\"faq-item\">\n        <summary><span class=\"idx\">Q.08<\u002Fspan><span>What platforms are delivered?<\u002Fspan><span class=\"pm\" aria-hidden=\"true\"><\u002Fspan><\u002Fsummary>\n        <div class=\"faq-item__body\">Depending on scope: 16:9, 9:16, 1:1, 4:5, 15s, 30s, 9s, 6s, CTV, OLV, Reels, TikTok, Shorts, pre-roll, and display derivatives.<\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═══ CREDITS MARQUEE ═══ -->\n  <div class=\"marquee\" aria-hidden=\"true\">\n    <div class=\"marquee__track\">\n      <div class=\"marquee__group\">\n        <span>Beauty<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>Fashion<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>Object<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>Service<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <em>Built like films<\u002Fem><span class=\"sep\"><\u002Fspan>\n        <span>35mm<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>50mm<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>100mm Macro<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>16:9 · 9:16 · 1:1 · 4:5<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <em>Directed, not generated<\u002Fem><span class=\"sep\"><\u002Fspan>\n        <span>30s · 15s · 9s · 6s<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>ProRes · H.265<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>Cinema · OLV · CTV · Social<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <em>One controlled system<\u002Fem><span class=\"sep\"><\u002Fspan>\n        <span>Est. 2026<\u002Fspan><span class=\"sep\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"marquee__group\" aria-hidden=\"true\">\n        <span>Beauty<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>Fashion<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>Object<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>Service<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <em>Built like films<\u002Fem><span class=\"sep\"><\u002Fspan>\n        <span>35mm<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>50mm<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>100mm Macro<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>16:9 · 9:16 · 1:1 · 4:5<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <em>Directed, not generated<\u002Fem><span class=\"sep\"><\u002Fspan>\n        <span>30s · 15s · 9s · 6s<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>ProRes · H.265<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <span>Cinema · OLV · CTV · Social<\u002Fspan><span class=\"sep\"><\u002Fspan>\n        <em>One controlled system<\u002Fem><span class=\"sep\"><\u002Fspan>\n        <span>Est. 2026<\u002Fspan><span class=\"sep\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══ 08 ENGAGE FINAL ═══ -->\n  <section id=\"engage\" class=\"engage-final\" data-screen-label=\"08 Engage\">\n    <div class=\"eyebrow reveal\" style=\"justify-content:center\">08 — Engage<\u002Fdiv>\n    <h2 class=\"display reveal d1\">\n      Bring the tension.<br><em>We'll build the film.<\u002Fem>\n    <\u002Fh2>\n    <p class=\"lede reveal d2\" style=\"margin-left:auto;margin-right:auto;text-align:center;\">\n      A product, a category, a launch, a service — or a viewer problem worth resolving on camera. Send the brief and we'll respond within two working days.\n    <\u002Fp>\n    <div class=\"reveal d2\" style=\"margin-top:22px;font-family:var(--mono);font-size:10.5px;letter-spacing:0.32em;text-transform:uppercase;color:var(--ash);display:inline-flex;align-items:center;gap:14px;justify-content:center;\">\n      <span style=\"width:18px;height:1px;background:var(--gold);opacity:.7;\"><\u002Fspan>\n      Selective roster · Direct to studio\n      <span style=\"width:18px;height:1px;background:var(--gold);opacity:.7;\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"form-shell reveal d3\">\n      <form class=\"form-card\" id=\"requestForm\" novalidate=\"\">\n        <div class=\"form-card__head\">\n          <span class=\"k\">Project Request · FRM.01<\u002Fspan>\n          <span class=\"v\">Direct to studio<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"form-row\">\n          <div class=\"form-field\">\n            <label for=\"f-name\">Your name <span class=\"req\">Required<\u002Fspan><\u002Flabel>\n            <input id=\"f-name\" name=\"name\" type=\"text\" required=\"\" autocomplete=\"name\" placeholder=\"Full name\">\n            <span class=\"err\">Please enter your name<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"form-field\">\n            <label for=\"f-email\">Email <span class=\"req\">Required<\u002Fspan><\u002Flabel>\n            <input id=\"f-email\" name=\"email\" type=\"email\" required=\"\" autocomplete=\"email\" placeholder=\"you@company.com\">\n            <span class=\"err\">Enter a valid email address<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"form-row\">\n          <div class=\"form-field\">\n            <label for=\"f-company\">Brand or company<\u002Flabel>\n            <input id=\"f-company\" name=\"company\" type=\"text\" autocomplete=\"organization\" placeholder=\"Brand name\">\n          <\u002Fdiv>\n          <div class=\"form-field\">\n            <label for=\"f-engagement\">Engagement <span class=\"req\">Required<\u002Fspan><\u002Flabel>\n            <select id=\"f-engagement\" name=\"engagement\" required=\"\">\n              <option value=\"\" disabled=\"\" selected=\"\">Select an engagement<\u002Foption>\n              <option value=\"Single Film\">E.01 — Single Film<\u002Foption>\n              <option value=\"Campaign Suite\">E.02 — Campaign Suite<\u002Foption>\n              <option value=\"Cinematic Brand System\">E.03 — Cinematic Brand System<\u002Foption>\n              <option value=\"Ongoing Production\">E.04 — Ongoing Production<\u002Foption>\n              <option value=\"Not sure yet\">Not sure yet<\u002Foption>\n            <\u002Fselect>\n            <span class=\"err\">Pick an engagement<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"form-row\">\n          <div class=\"form-field\">\n            <label for=\"f-category\">Category<\u002Flabel>\n            <input id=\"f-category\" name=\"category\" type=\"text\" placeholder=\"Beauty, fashion, service, object…\">\n          <\u002Fdiv>\n          <div class=\"form-field\">\n            <label for=\"f-timeline\">Timeline<\u002Flabel>\n            <select id=\"f-timeline\" name=\"timeline\">\n              <option value=\"\" disabled=\"\" selected=\"\">Select a timeline<\u002Foption>\n              <option value=\"Under 3 weeks\">Under 3 weeks<\u002Foption>\n              <option value=\"3 – 6 weeks\">3 – 6 weeks<\u002Foption>\n              <option value=\"6 – 12 weeks\">6 – 12 weeks<\u002Foption>\n              <option value=\"Quarter+\">Quarter+<\u002Foption>\n              <option value=\"Flexible\">Flexible<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"form-row\">\n          <div class=\"form-field full\">\n            <label for=\"f-brief\">Brief <span class=\"req\">Required<\u002Fspan><\u002Flabel>\n            <textarea id=\"f-brief\" name=\"brief\" required=\"\" placeholder=\"Product, viewer tension, commercial objective, platform, constraints, any references…\"><\u002Ftextarea>\n            <span class=\"err\">Tell us about the project<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"form-foot\">\n          <p class=\"form-foot__note\">\n            Sent directly to <span class=\"gold\">info@asterframe.com<\u002Fspan>. No third parties.\n          <\u002Fp>\n          <button class=\"form-submit\" type=\"submit\">\n            Send request <span class=\"arr\" aria-hidden=\"true\"><\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fform>\n\n      <div class=\"form-thanks\" id=\"formThanks\" role=\"status\" aria-live=\"polite\">\n        <div class=\"glyph\" aria-hidden=\"true\"><\u002Fdiv>\n        <h4>Your brief is on its way.<\u002Fh4>\n        <p>We opened your mail client with the request prepared for the studio inbox. Hit send and we'll respond within two working days.<\u002Fp>\n        <button class=\"relink\" id=\"formReset\" type=\"button\">Send another request<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n<footer>\n  <div class=\"foot__top\">\n    <div>\n      <h3 class=\"foot__brand\">ASTER<\u002Fh3>\n      <p class=\"foot__tag\">An AI-native commercial film studio. We direct image, motion, desire, and brand meaning — from human truth to platform delivery, supervised in one controlled cinematic system.<\u002Fp>\n    <p class=\"foot__tag\" style=\"font-family:var(--mono);font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:var(--ash);margin-top:14px;max-width:30ch;\"><span style=\"color:var(--gold);\">Aster<\u002Fspan> · from the Greek — star, vision.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"foot__links\">\n      <h5>Frame<\u002Fh5>\n      <ul>\n        <li><a href=\"#premise\">Premise<\u002Fa><\u002Fli>\n        <li><a href=\"#method\">Method<\u002Fa><\u002Fli>\n        <li><a href=\"#engagements\">Engagements<\u002Fa><\u002Fli>\n        <li><a href=\"#work\">Work<\u002Fa><\u002Fli>\n        <li><a href=\"#faq\">FAQ<\u002Fa><\u002Fli>\n        <li><a href=\"#engage\">Engage<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"foot__links\">\n      <h5>Studio<\u002Fh5>\n      <ul>\n        <li><a href=\"mailto:info@asterframe.com\">info@asterframe.com<\u002Fa><\u002Fli>\n        <li><a href=\"#engage\">Briefs<\u002Fa><\u002Fli>\n        <li><a href=\"#engage\">Press<\u002Fa><\u002Fli>\n        <li><a href=\"#engage\">Careers<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot__bottom\">\n    <span>© 2026 ASTER FRAME · Legal business · Est. 2026<\u002Fspan>\n    <span>Built for human tension · Cinematic realism · AI-native control<\u002Fspan>\n    <span>v03.0 / Frame Master<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- THREE.js removed — layout now uses CSS dot patterns -->\n\n<script>\n  /* ─────────── ambient particle dotfield — 3D parallax + liquid wobble ───────────\n     Sparse field of dots that drift, gently respond to cursor (3D feel),\n     and wobble on a sine curve so the whole field reads as fluid, not random. */\n  (function () {\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const canvas = document.getElementById('particles');\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d');\n    let W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);\n    let mx = 0.5, my = 0.5;\n    let pxOff = 0, pyOff = 0;\n    const particles = [];\n    // particle count scales with viewport area but capped\n    function targetCount() {\n      const a = innerWidth * innerHeight;\n      return Math.max(70, Math.min(160, Math.round(a / 14000)));\n    }\n\n    function resize() {\n      W = canvas.width  = Math.floor(innerWidth  * dpr);\n      H = canvas.height = Math.floor(innerHeight * dpr);\n      canvas.style.width  = innerWidth  + 'px';\n      canvas.style.height = innerHeight + 'px';\n    }\n\n    // palette — night-sky temperature variation\n    const STAR_COLORS = [\n      [248,250,252],\n      [224,231,255],\n      [196,181,253],\n      [110,94,60],    // icon shadow-gold particles\n      [204,174,108],    // icon primary-gold pulse\n      [216,184,114]     // magenta spectral highlights\n    ];\n    function pickColor() {\n      return STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];\n    }\n\n    function makeParticle() {\n      const z = Math.random();\n      // 22% become stars (twinkle + cross + halo); the rest stay ambient dust\n      const isStar = Math.random() < 0.22;\n      const c = isStar ? pickColor() : (Math.random() < 0.65 ? [204,174,108] : [241,235,221]);\n      return {\n        x: Math.random() * W,\n        y: Math.random() * H,\n        vx: (Math.random() - 0.5) * 0.10 * dpr,\n        vy: (Math.random() - 0.5) * 0.10 * dpr,\n        r: (isStar ? (0.7 + z * 1.6) : (0.55 + z * 1.4)) * dpr,\n        a: isStar ? (0.35 + z * 0.55) : (0.10 + z * 0.32),\n        phase: Math.random() * Math.PI * 2,\n        freq: 0.5 + Math.random() * 0.7,\n        twFreq: 0.7 + Math.random() * 1.4,\n        z: z,\n        star: isStar,\n        rgb: c\n      };\n    }\n\n    function init() {\n      particles.length = 0;\n      const N = targetCount();\n      for (let i = 0; i < N; i++) particles.push(makeParticle());\n    }\n\n    function onMouse(e) {\n      mx = e.clientX / innerWidth;\n      my = e.clientY / innerHeight;\n    }\n    function onTouch(e) {\n      if (!e.touches || !e.touches[0]) return;\n      mx = e.touches[0].clientX / innerWidth;\n      my = e.touches[0].clientY / innerHeight;\n    }\n\n    // ─── rare shooting star ───\n    let shoot = null;\n    let nextShootAt = performance.now() + 6000 + Math.random() * 12000;\n    function maybeSpawnShoot(now) {\n      if (shoot || now < nextShootAt) return;\n      const fromLeft = Math.random() < 0.5;\n      const startY = (0.05 + Math.random() * 0.55) * H;\n      const speed = (7 + Math.random() * 4) * dpr;\n      shoot = {\n        x: fromLeft ? -60 * dpr : W + 60 * dpr,\n        y: startY,\n        vx: (fromLeft ? 1 : -1) * speed,\n        vy: (2 + Math.random() * 2.5) * dpr,\n        life: 1.0\n      };\n    }\n    function drawShoot() {\n      if (!shoot) return;\n      shoot.x += shoot.vx;\n      shoot.y += shoot.vy;\n      shoot.life -= 0.014;\n      if (shoot.life <= 0 || shoot.x < -200 * dpr || shoot.x > W + 200 * dpr) {\n        shoot = null;\n        nextShootAt = performance.now() + 18000 + Math.random() * 26000;\n        return;\n      }\n      const tx = shoot.x - shoot.vx * 7;\n      const ty = shoot.y - shoot.vy * 7;\n      const grd = ctx.createLinearGradient(tx, ty, shoot.x, shoot.y);\n      grd.addColorStop(0, 'rgba(241,235,221,0)');\n      grd.addColorStop(1, 'rgba(255,250,225,' + (0.75 * shoot.life) + ')');\n      ctx.strokeStyle = grd;\n      ctx.lineWidth = 1.3 * dpr;\n      ctx.lineCap = 'round';\n      ctx.beginPath();\n      ctx.moveTo(tx, ty);\n      ctx.lineTo(shoot.x, shoot.y);\n      ctx.stroke();\n      ctx.beginPath();\n      ctx.arc(shoot.x, shoot.y, 1.8 * dpr * shoot.life, 0, Math.PI * 2);\n      ctx.fillStyle = 'rgba(255,250,225,' + shoot.life + ')';\n      ctx.fill();\n    }\n\n    let t = 0;\n    function frame(now) {\n      t += 0.012;\n      const tx = (mx - 0.5) * 36 * dpr;\n      const ty = (my - 0.5) * 36 * dpr;\n      pxOff += (tx - pxOff) * 0.045;\n      pyOff += (ty - pyOff) * 0.045;\n\n      ctx.clearRect(0, 0, W, H);\n      ctx.lineCap = 'butt';\n\n      for (let i = 0; i < particles.length; i++) {\n        const p = particles[i];\n        p.x += p.vx + Math.sin(t * p.freq + p.phase)        * 0.07 * dpr;\n        p.y += p.vy + Math.cos(t * p.freq * 0.85 + p.phase) * 0.06 * dpr;\n        if (p.x < -30) p.x = W + 30;\n        if (p.x > W + 30) p.x = -30;\n        if (p.y < -30) p.y = H + 30;\n        if (p.y > H + 30) p.y = -30;\n\n        const dx = p.x + pxOff * p.z;\n        const dy = p.y + pyOff * p.z;\n        const r = p.rgb[0], g = p.rgb[1], b = p.rgb[2];\n\n        if (p.star) {\n          const tw = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(t * p.twFreq + p.phase * 2));\n          const aTw = p.a * tw;\n          const halo = ctx.createRadialGradient(dx, dy, 0, dx, dy, p.r * 7);\n          halo.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',' + (aTw * 0.42) + ')');\n          halo.addColorStop(0.5, 'rgba(' + r + ',' + g + ',' + b + ',' + (aTw * 0.10) + ')');\n          halo.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');\n          ctx.fillStyle = halo;\n          ctx.beginPath();\n          ctx.arc(dx, dy, p.r * 7, 0, Math.PI * 2);\n          ctx.fill();\n          const spikeLen = p.r * (3.2 + 1.4 * tw);\n          ctx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (aTw * 0.7) + ')';\n          ctx.lineWidth = 0.5 * dpr;\n          ctx.beginPath();\n          ctx.moveTo(dx - spikeLen, dy); ctx.lineTo(dx + spikeLen, dy);\n          ctx.moveTo(dx, dy - spikeLen); ctx.lineTo(dx, dy + spikeLen);\n          ctx.stroke();\n          ctx.beginPath();\n          ctx.arc(dx, dy, p.r * 0.85, 0, Math.PI * 2);\n          ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + Math.min(1, aTw * 1.5) + ')';\n          ctx.fill();\n        } else {\n          ctx.beginPath();\n          ctx.arc(dx, dy, p.r, 0, Math.PI * 2);\n          ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + p.a + ')';\n          ctx.fill();\n        }\n      }\n\n      maybeSpawnShoot(now || performance.now());\n      drawShoot();\n\n      raf = requestAnimationFrame(frame);\n    }\n\n    let raf;\n    function start() { cancelAnimationFrame(raf); raf = requestAnimationFrame(frame); }\n    function stop()  { cancelAnimationFrame(raf); ctx && ctx.clearRect(0, 0, W, H); }\n\n    // pause when tab hidden, resume when visible — saves cycles\n    document.addEventListener('visibilitychange', () => {\n      if (document.hidden) stop(); else start();\n    });\n\n    resize(); init();\n    if (reduce) {\n      // still draw a single static frame so the field is present, just no motion\n      ctx.clearRect(0, 0, W, H);\n      for (const p of particles) {\n        const r = p.rgb[0], g = p.rgb[1], b = p.rgb[2];\n        if (p.star) {\n          const halo = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 6);\n          halo.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',' + (p.a * 0.3) + ')');\n          halo.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');\n          ctx.fillStyle = halo;\n          ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 6, 0, Math.PI*2); ctx.fill();\n        }\n        ctx.beginPath();\n        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);\n        ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + p.a + ')';\n        ctx.fill();\n      }\n    } else {\n      start();\n    }\n\n    window.addEventListener('resize', () => {\n      resize();\n      const N = targetCount();\n      while (particles.length < N) particles.push(makeParticle());\n      while (particles.length > N) particles.pop();\n    });\n    window.addEventListener('mousemove', onMouse, { passive: true });\n    window.addEventListener('touchmove', onTouch, { passive: true });\n  })();\n\n  /* nav scrolled state + scroll progress bar + active link */\n  const nav = document.getElementById('nav');\n  const links = document.querySelectorAll('.nav-links a');\n  const onScroll = () => {\n    const compactAt = Math.min(440, Math.max(300, window.innerHeight * 0.46));\n    const compact = window.scrollY > compactAt;\n    nav.classList.toggle('scrolled', compact);\n    const hero = document.getElementById('hero');\n    if (hero) hero.classList.toggle('scrolled', compact);\n    const docH = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);\n    const frac = Math.min(1, Math.max(0, window.scrollY / docH));\n    nav.style.setProperty('--scroll-progress', (frac * 100).toFixed(2) + '%');\n  };\n  window.addEventListener('scroll', onScroll, { passive: true });\n  window.addEventListener('resize', onScroll);\n  onScroll();\n\n  /* reveal */\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });\n  }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n  /* active nav link from visible section */\n  const sectionIds = ['premise', 'method', 'engagements', 'work', 'qc', 'faq'];\n  const sections = sectionIds.map(id => document.getElementById(id));\n  const ro = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        const id = e.target.id;\n        links.forEach(a => a.classList.toggle('active', a.dataset.target === id));\n      }\n    });\n  }, { threshold: 0.45 });\n  sections.forEach(s => s && ro.observe(s));\n\n  /* mobile menu */\n  const menuBtn = document.getElementById('menuBtn');\n  const mobileMenu = document.getElementById('mobileMenu');\n  const menuClose = document.getElementById('menuClose');\n  const setMenu = (open) => {\n    mobileMenu.classList.toggle('open', open);\n    mobileMenu.setAttribute('aria-hidden', String(!open));\n    document.body.style.overflow = open ? 'hidden' : '';\n  };\n  menuBtn && menuBtn.addEventListener('click', () => setMenu(true));\n  menuClose && menuClose.addEventListener('click', () => setMenu(false));\n  document.querySelectorAll('[data-mm]').forEach(a => a.addEventListener('click', () => setMenu(false)));\n  document.addEventListener('keydown', e => { if (e.key === 'Escape') setMenu(false); });\n\n  /* ─── project request form ─── */\n  (function () {\n    const form = document.getElementById('requestForm');\n    const thanks = document.getElementById('formThanks');\n    const reset = document.getElementById('formReset');\n    if (!form) return;\n\n    const TO = ['info@asterframe.com'];\n\n    const fields = {\n      name:        { el: document.getElementById('f-name'),       required: true },\n      email:       { el: document.getElementById('f-email'),      required: true, type: 'email' },\n      company:     { el: document.getElementById('f-company'),    required: false },\n      engagement:  { el: document.getElementById('f-engagement'), required: true },\n      category:    { el: document.getElementById('f-category'),   required: false },\n      timeline:    { el: document.getElementById('f-timeline'),   required: false },\n      brief:       { el: document.getElementById('f-brief'),      required: true },\n    };\n\n    const emailRe = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;\n\n    function validate() {\n      let ok = true;\n      for (const k of Object.keys(fields)) {\n        const f = fields[k];\n        const wrap = f.el.closest('.form-field');\n        const v = (f.el.value || '').trim();\n        let bad = false;\n        if (f.required && !v) bad = true;\n        if (!bad && f.type === 'email' && v && !emailRe.test(v)) bad = true;\n        wrap.classList.toggle('invalid', bad);\n        if (bad) ok = false;\n      }\n      return ok;\n    }\n\n    // live-clear invalid state as user types\n    Object.values(fields).forEach(f => {\n      f.el.addEventListener('input', () => {\n        const wrap = f.el.closest('.form-field');\n        if (wrap.classList.contains('invalid')) wrap.classList.remove('invalid');\n      });\n      f.el.addEventListener('change', () => {\n        const wrap = f.el.closest('.form-field');\n        if (wrap.classList.contains('invalid')) wrap.classList.remove('invalid');\n      });\n    });\n\n    function buildBody(data) {\n      const lines = [\n        'New project request from asterframe.com',\n        '──────────────────────────────────────',\n        '',\n        'Name:        ' + (data.name || '—'),\n        'Email:       ' + (data.email || '—'),\n        'Company:     ' + (data.company || '—'),\n        'Engagement:  ' + (data.engagement || '—'),\n        'Category:    ' + (data.category || '—'),\n        'Timeline:    ' + (data.timeline || '—'),\n        '',\n        '── Brief ──',\n        (data.brief || '—'),\n        '',\n        '──────────────────────────────────────',\n        'Sent ' + new Date().toLocaleString(),\n      ];\n      return lines.join('\\n');\n    }\n\n    form.addEventListener('submit', (e) => {\n      e.preventDefault();\n      if (!validate()) {\n        const firstBad = form.querySelector('.form-field.invalid input, .form-field.invalid textarea, .form-field.invalid select');\n        firstBad && firstBad.focus();\n        return;\n      }\n      const data = {};\n      Object.keys(fields).forEach(k => data[k] = (fields[k].el.value || '').trim());\n\n      const subject = '[ASTER] Project request — ' + (data.engagement || 'Inquiry') + ' · ' + (data.name || 'Anonymous');\n      const body = buildBody(data);\n      const mailto = 'mailto:' + TO.join(',') +\n        '?subject=' + encodeURIComponent(subject) +\n        '&body=' + encodeURIComponent(body);\n\n      // open user's mail client with both recipients pre-filled\n      window.location.href = mailto;\n\n      // show thank-you state\n      form.style.display = 'none';\n      thanks.classList.add('show');\n    });\n\n    reset && reset.addEventListener('click', () => {\n      form.reset();\n      form.style.display = '';\n      thanks.classList.remove('show');\n      form.querySelectorAll('.form-field.invalid').forEach(f => f.classList.remove('invalid'));\n      document.getElementById('f-name').focus();\n    });\n  })();\n\n  /* ─── filmstrip nav: arrow buttons + smart edge fades ─── */\n  (function () {\n    const strip = document.getElementById('filmstrip');\n    if (!strip) return;\n    const wrap = strip.closest('.filmstrip-wrap');\n    const prevBtn = wrap.querySelector('[data-fs-nav=\"prev\"]');\n    const nextBtn = wrap.querySelector('[data-fs-nav=\"next\"]');\n    const counter = wrap.querySelector('[data-fs-counter]');\n    const cards = Array.from(strip.querySelectorAll('.phase'));\n    const total = cards.length;\n\n    function stepDistance() {\n      // one card width + gap between cards\n      const first = cards[0];\n      const second = cards[1];\n      if (!first) return strip.clientWidth * 0.8;\n      if (second) return second.getBoundingClientRect().left - first.getBoundingClientRect().left;\n      return first.getBoundingClientRect().width + 18;\n    }\n\n    function updateState() {\n      const max = strip.scrollWidth - strip.clientWidth;\n      const x = strip.scrollLeft;\n      const atStart = x <= 2;\n      const atEnd = x >= max - 2;\n      wrap.setAttribute('data-fs-at-start', String(atStart));\n      wrap.setAttribute('data-fs-at-end', String(atEnd));\n      if (prevBtn) prevBtn.toggleAttribute('disabled', atStart);\n      if (nextBtn) nextBtn.toggleAttribute('disabled', atEnd);\n\n      // counter: which card's left edge is closest to the strip's left visible edge\n      if (counter && total) {\n        const stripLeft = strip.getBoundingClientRect().left;\n        let active = 0;\n        let bestDist = Infinity;\n        for (let i = 0; i < cards.length; i++) {\n          const cLeft = cards[i].getBoundingClientRect().left;\n          const d = Math.abs(cLeft - stripLeft);\n          if (d < bestDist) { bestDist = d; active = i; }\n        }\n        const n = String(active + 1).padStart(2, '0');\n        const t = String(total).padStart(2, '0');\n        counter.textContent = n + ' / ' + t;\n      }\n    }\n\n    function scrollByStep(dir) {\n      strip.scrollBy({ left: dir * stepDistance(), behavior: 'smooth' });\n    }\n\n    prevBtn && prevBtn.addEventListener('click', () => scrollByStep(-1));\n    nextBtn && nextBtn.addEventListener('click', () => scrollByStep(1));\n\n    strip.addEventListener('scroll', updateState, { passive: true });\n    window.addEventListener('resize', updateState);\n    updateState();\n\n    // keyboard support when the strip area has focus\n    wrap.tabIndex = 0;\n    wrap.addEventListener('keydown', (e) => {\n      if (e.key === 'ArrowLeft') { e.preventDefault(); scrollByStep(-1); }\n      else if (e.key === 'ArrowRight') { e.preventDefault(); scrollByStep(1); }\n    });\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
